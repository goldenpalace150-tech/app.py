name: 24/7 Live Attendance Monitor

on:
  schedule:
    - cron: '0 */5 * * *' # Auto-restarts every 5 hours to stay active 24/7
  workflow_dispatch: # Allows clicking a manual "Play" button anytime

jobs:
  run-monitor:
    runs-on: windows-latest

    steps:
    - name: Download Repository Source Code
      uses: actions/checkout@v4

    - name: Configure Cloud Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Critical Web & Database Libraries
      run: |
        python -m pip install --upgrade pip
        pip install psycopg2-binary pyppeteer

    - name: Restore WhatsApp Session Cache Folder
      id: wa-cache
      uses: actions/cache@v4
      with:
        path: 'C:\Users\runneradmin\AppData\Local\Google\Chrome\User Data\WhatsAppCloudSession'
        key: wa-session-${{ github.run_id }}
        restore-keys: |
          wa-session-

    - name: Execute Live Real-time Scanner Engine
      timeout-minutes: 290 # Exits cleanly after 4 hours and 50 minutes to securely save your cache file
      working-directory: ${{ github.workspace }} # FIXED: Forces runner to execute directly from your repository root directory
      env:
        NEON_DB_URL: ${{ secrets.NEON_DATABASE_URL }}
      run: |
        python silent_monitor.py

    - name: Upload WhatsApp Login Screenshot
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: whatsapp-qr-snapshot
        path: whatsapp_cloud_login.png

    - name: Save Updated WhatsApp Session Cache Folder
      if: always()
      uses: actions/cache/save@v4
      with:
        path: 'C:\Users\runneradmin\AppData\Local\Google\Chrome\User Data\WhatsAppCloudSession'
        key: wa-session-${{ github.run_id }}
